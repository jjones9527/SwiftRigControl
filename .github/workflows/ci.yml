name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-test:
    name: Build & test (macOS)
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        # The package declares swift-tools-version: 6.2, which ships in
        # Xcode 17. Selecting the latest stable Xcode keeps the runner
        # picture-aligned with the project requirement without pinning
        # to a specific minor version that we'd have to bump every
        # release.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache .build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build (library only, warnings as errors)
        # Hardware-validator executables and debug tools build cleanly
        # too, but the library is what consumers depend on — gate on it
        # explicitly so a warning in a debug tool can't sneak past while
        # the library itself remains clean.
        run: |
          swift build \
            --target RigControl \
            -Xswiftc -warnings-as-errors

      - name: Build all targets
        # Catch regressions in XPC, helper, and validators without
        # making them gating for warnings — they evolve faster than
        # the library and may accumulate harmless warnings transiently.
        run: swift build

      - name: Test
        # Hardware suites are gated by env vars (IC7100_SERIAL_PORT,
        # IC7600_SERIAL_PORT, IC9700_SERIAL_PORT, K2_SERIAL_PORT) and
        # auto-skip when those are absent — exactly the case on CI.
        # Unit and protocol (MockTransport) suites run unconditionally.
        run: swift test --parallel

      - name: Build tools subproject
        # Tools/SwiftRigControlTools/ is a separate SwiftPM project
        # that houses hardware validators, interactive validators, and
        # debug tools. It is NOT pulled by library consumers, but we
        # still want to know if a library change breaks one of the
        # tools — building it on CI catches that.
        working-directory: Tools/SwiftRigControlTools
        run: swift build
