name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Permissions are required by actions/deploy-pages. We grant them at
# the workflow level so they're available to the deploy step, but
# `pages: write` and `id-token: write` are only consumed when the
# deploy step actually runs (push to main).
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    name: Build & test (macOS)
    runs-on: macos-15
    timeout-minutes: 20

    # Publish the DocC site to GitHub Pages on push to main only. The
    # environment is what wires actions/deploy-pages to the GitHub
    # Pages target; the `url` field surfaces the deployed URL in the
    # job summary.
    environment:
      name: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'github-pages' || '' }}
      url: ${{ steps.deploy-docs.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select latest stable Xcode
        # The package declares swift-tools-version: 6.2, which ships in
        # Xcode 17. Selecting the latest stable Xcode keeps the runner
        # picture-aligned with the project requirement without pinning
        # to a specific minor version that we'd have to bump every
        # release.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache .build
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Check public-symbol documentation
        # Inheritance-aware audit: flags any public declaration in
        # Sources/RigControl/ that lacks a /// doc comment, excluding
        # declarations DocC inherits documentation for via protocol
        # conformance (CATProtocol, SerialTransport, CIVCommandSet).
        # Run early so doc regressions surface before the longer
        # build/test steps.
        run: python3 Scripts/check-public-docs.py

      - name: Build (library only, warnings as errors)
        # Hardware-validator executables and debug tools build cleanly
        # too, but the library is what consumers depend on — gate on it
        # explicitly so a warning in a debug tool can't sneak past while
        # the library itself remains clean.
        run: |
          swift build \
            --target RigControl \
            -Xswiftc -warnings-as-errors

      - name: Build DocC (warnings as errors, hosting-ready)
        # Surfaces broken symbol cross-references, missing parameter
        # docs, and other DocC issues that the regular Swift compiler
        # silently ignores. SwiftDocCPlugin is a build-time-only
        # dependency declared in Package.swift; see CLAUDE.md's
        # "build-time-only dependencies" exception.
        #
        # --transform-for-static-hosting rewrites internal links to
        # work under a sub-path (required for GitHub Pages, which
        # serves the site at /SwiftRigControl/...). Even on PR
        # builds where we don't deploy, building with this flag
        # catches link-rewriting regressions early.
        run: |
          swift package \
            --allow-writing-to-directory ./docs-build \
            generate-documentation \
            --target RigControl \
            --warnings-as-errors \
            --transform-for-static-hosting \
            --hosting-base-path SwiftRigControl \
            --output-path ./docs-build

      # ---- GitHub Pages deploy (push to main only) ----
      # The remaining steps only run on `push` to `main`. PRs and tag
      # pushes build docs but don't publish them. The CI gates above
      # have already enforced lint, library warnings-as-errors, tests,
      # tools, and DocC warnings-as-errors, so anything published here
      # has passed the same bar as a merge.

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs-build

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deploy-docs
        uses: actions/deploy-pages@v5

      - name: Build all targets
        # Catch regressions in XPC, helper, and validators without
        # making them gating for warnings — they evolve faster than
        # the library and may accumulate harmless warnings transiently.
        run: swift build

      - name: Test
        # Hardware suites are gated by env vars (IC7100_SERIAL_PORT,
        # IC7600_SERIAL_PORT, IC9700_SERIAL_PORT, K2_SERIAL_PORT) and
        # auto-skip when those are absent — exactly the case on CI.
        # Unit and protocol (MockTransport) suites run unconditionally.
        run: swift test --parallel

      - name: Build tools subproject
        # Tools/SwiftRigControlTools/ is a separate SwiftPM project
        # that houses hardware validators, interactive validators, and
        # debug tools. It is NOT pulled by library consumers, but we
        # still want to know if a library change breaks one of the
        # tools — building it on CI catches that.
        working-directory: Tools/SwiftRigControlTools
        run: swift build
